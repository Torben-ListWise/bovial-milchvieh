<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Deep background circle -->
  <circle cx="100" cy="100" r="96" fill="#080f1a"/>
  <!-- Subtle ring -->
  <circle cx="100" cy="100" r="90" stroke="url(#ring-grad)" stroke-width="1.5" opacity="0.5"/>
  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="78" stroke="url(#outer-grad)" stroke-width="6" opacity="0.15"/>
  <!-- Mid glow ring -->
  <circle cx="100" cy="100" r="64" stroke="url(#mid-grad)" stroke-width="2" opacity="0.25"/>
  <!-- Central spark / data node -->
  <path d="M100 58 L111 88 L142 100 L111 112 L100 142 L89 112 L58 100 L89 88 Z"
        fill="url(#spark-grad)" opacity="0.95"/>
  <!-- Inner spark highlight -->
  <path d="M100 72 L107 93 L128 100 L107 107 L100 128 L93 107 L72 100 L93 93 Z"
        fill="url(#inner-spark)" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="100" cy="100" r="6" fill="#f0fdf4" opacity="0.9"/>
  <!-- Orbit dots (data nodes) -->
  <circle cx="100" cy="36" r="3.5" fill="#34d399" opacity="0.7"/>
  <circle cx="148" cy="68" r="2.5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="148" cy="132" r="2.5" fill="#34d399" opacity="0.4"/>
  <circle cx="100" cy="164" r="3" fill="#34d399" opacity="0.5"/>
  <circle cx="52" cy="132" r="2.5" fill="#a78bfa" opacity="0.4"/>
  <circle cx="52" cy="68" r="2.5" fill="#22d3ee" opacity="0.4"/>
  <!-- Connection lines (faint) -->
  <line x1="100" y1="39" x2="100" y2="68" stroke="#34d399" stroke-width="1" opacity="0.2"/>
  <line x1="145" y1="70" x2="122" y2="88" stroke="#22d3ee" stroke-width="1" opacity="0.2"/>
  <line x1="145" y1="130" x2="122" y2="112" stroke="#34d399" stroke-width="1" opacity="0.15"/>
  <line x1="100" y1="161" x2="100" y2="132" stroke="#34d399" stroke-width="1" opacity="0.15"/>
  <line x1="55" y1="130" x2="78" y2="112" stroke="#a78bfa" stroke-width="1" opacity="0.15"/>
  <line x1="55" y1="70" x2="78" y2="88" stroke="#22d3ee" stroke-width="1" opacity="0.2"/>
  <defs>
    <radialGradient id="spark-grad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="60%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </radialGradient>
    <radialGradient id="inner-spark" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f0fdf4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.2"/>
    </radialGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="outer-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="mid-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
</svg>
