<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Soft cream background circle for contrast -->
  <circle cx="100" cy="100" r="90" fill="#F7F5F0" />
  
  <!-- Outer border representing stability/farming -->
  <circle cx="100" cy="100" r="80" stroke="#2B5242" stroke-width="12" />
  
  <!-- Stylized cow head silhouette inside -->
  <path d="M 60,80 Q 50,110 80,140 Q 100,160 120,140 Q 150,110 140,80 Q 130,50 100,50 Q 70,50 60,80 Z" fill="#2B5242" />
  
  <!-- Ears -->
  <path d="M 50,85 Q 30,90 35,70 Q 40,65 60,70 Z" fill="#2B5242" />
  <path d="M 150,85 Q 170,90 165,70 Q 160,65 140,70 Z" fill="#2B5242" />
  
  <!-- Data chart lines overlay indicating analysis -->
  <polyline points="70,110 90,90 110,105 130,75" stroke="#F7F5F0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="130" cy="75" r="8" fill="#F7F5F0" />
</svg>