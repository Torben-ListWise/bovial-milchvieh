kind = "web"
previewPath = "/"
title = "Milchvieh Datenanalyse-Assistent"
version = "1.0.0"
id = "artifacts/milchvieh"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25745

[services.development]
run = "pnpm --filter @workspace/milchvieh run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/milchvieh", "run", "build" ]
publicDir = "artifacts/milchvieh/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25745"
BASE_PATH = "/"
