kind = "mobile"
previewPath = "/mobile/"
title = "Bovial Mobile"
version = "1.0.0"
id = "artifacts/bovial-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 21326

[services.development]
run = "pnpm --filter @workspace/bovial-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bovial-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/bovial-mobile", "run", "serve" ]

[services.env]
PORT = "21326"
BASE_PATH = "/mobile/"
