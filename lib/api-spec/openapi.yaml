openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Milchvieh Datenanalyse-Assistent API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: Account
    description: Current user and role.
  - name: Datasets
    description: Dairy farm datasets (Betriebe).
  - name: Files
    description: Uploaded source files and ingestion.
  - name: Analyses
    description: Analysis conversations and AI question answering.
  - name: Insights
    description: Overview KPIs, suggestions and warnings.
  - name: Rules
    description: Customer-defined analysis rules and thresholds.
  - name: MasterData
    description: Operator-maintained trusted reference data.
  - name: Reports
    description: Scheduled and on-demand reports.
  - name: Admin
    description: Operator monitoring (metadata only, no customer data).
  - name: Templates
    description: DB-driven one-click analysis templates.
  - name: Privacy
    description: DSGVO data export and deletion.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      tags: [Account]
      operationId: getCurrentUser
      summary: Get the current authenticated user and role
      responses:
        "200":
          description: Current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags: [Account]
      operationId: updateMe
      summary: Update current user's profile (focus_areas only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeBody"
      responses:
        "200":
          description: Updated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /datasets:
    get:
      tags: [Datasets]
      operationId: listDatasets
      summary: List the current user's datasets
      responses:
        "200":
          description: Datasets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dataset"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Datasets]
      operationId: createDataset
      summary: Create a dataset (farm)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetInput"
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /datasets/{datasetId}:
    get:
      tags: [Datasets]
      operationId: getDataset
      summary: Get a dataset
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "200":
          description: Dataset.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Datasets]
      operationId: updateDataset
      summary: Update a dataset
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetUpdate"
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Datasets]
      operationId: deleteDataset
      summary: Delete a dataset and all its data
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "204":
          description: Deleted.
        "404":
          $ref: "#/components/responses/NotFound"

  /datasets/{datasetId}/overview:
    get:
      tags: [Insights]
      operationId: getDatasetOverview
      summary: Dashboard overview KPIs and trends for a dataset
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "200":
          description: Overview.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetOverview"
        "404":
          $ref: "#/components/responses/NotFound"

  /datasets/{datasetId}/suggestions:
    get:
      tags: [Insights]
      operationId: getQuestionSuggestions
      summary: Suggested analysis questions for a dataset
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "200":
          description: Suggestions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuestionSuggestion"

  /datasets/{datasetId}/files:
    get:
      tags: [Files]
      operationId: listFiles
      summary: List files in a dataset
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "200":
          description: Files.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SourceFile"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Files]
      operationId: registerFile
      summary: Register an uploaded file and start ingestion
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceFileInput"
      responses:
        "201":
          description: Registered; ingestion started.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceFile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /files/{fileId}:
    get:
      tags: [Files]
      operationId: getFile
      summary: Get a file with ingestion status and column mapping
      parameters:
        - $ref: "#/components/parameters/FileId"
      responses:
        "200":
          description: File.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceFileDetail"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Files]
      operationId: deleteFile
      summary: Delete a file and its parsed data
      parameters:
        - $ref: "#/components/parameters/FileId"
      responses:
        "204":
          description: Deleted.
        "404":
          $ref: "#/components/responses/NotFound"
  /files/{fileId}/mapping:
    patch:
      tags: [Files]
      operationId: updateColumnMapping
      summary: Confirm or correct the column mapping for a file
      parameters:
        - $ref: "#/components/parameters/FileId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ColumnMappingUpdate"
      responses:
        "200":
          description: Mapping updated; re-ingestion started.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceFileDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /datasets/{datasetId}/analyses:
    get:
      tags: [Analyses]
      operationId: listAnalyses
      summary: List analyses for a dataset
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "200":
          description: Analyses.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Analysis"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Analyses]
      operationId: createAnalysis
      summary: Start a new analysis conversation
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisInput"
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /analyses/{analysisId}:
    get:
      tags: [Analyses]
      operationId: getAnalysis
      summary: Get an analysis with its messages and charts
      parameters:
        - $ref: "#/components/parameters/AnalysisId"
      responses:
        "200":
          description: Analysis.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisDetail"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Analyses]
      operationId: updateAnalysis
      summary: Rename, pin, categorize or tag an analysis
      parameters:
        - $ref: "#/components/parameters/AnalysisId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisUpdate"
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Analyses]
      operationId: deleteAnalysis
      summary: Delete an analysis
      parameters:
        - $ref: "#/components/parameters/AnalysisId"
      responses:
        "204":
          description: Deleted.
        "404":
          $ref: "#/components/responses/NotFound"
  /analyses/{analysisId}/messages:
    post:
      tags: [Analyses]
      operationId: askQuestion
      summary: Ask a question; runs the AI agent and returns the answer
      parameters:
        - $ref: "#/components/parameters/AnalysisId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionInput"
      responses:
        "200":
          description: Accepted; agent runs in background. Poll the analysis for new messages.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AskQuestionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /rules:
    get:
      tags: [Rules]
      operationId: listRules
      summary: List the current user's analysis rules
      responses:
        "200":
          description: Rules.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rule"
    post:
      tags: [Rules]
      operationId: createRule
      summary: Create an analysis rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleInput"
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
        "400":
          $ref: "#/components/responses/BadRequest"
  /rules/{ruleId}:
    patch:
      tags: [Rules]
      operationId: updateRule
      summary: Update a rule
      parameters:
        - $ref: "#/components/parameters/RuleId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleUpdate"
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Rules]
      operationId: deleteRule
      summary: Delete a rule
      parameters:
        - $ref: "#/components/parameters/RuleId"
      responses:
        "204":
          description: Deleted.
        "404":
          $ref: "#/components/responses/NotFound"

  /datasets/{datasetId}/warnings:
    get:
      tags: [Insights]
      operationId: listWarnings
      summary: List anomaly warnings for a dataset
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "200":
          description: Warnings.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Warning"
        "404":
          $ref: "#/components/responses/NotFound"
  /warnings/{warningId}:
    patch:
      tags: [Insights]
      operationId: updateWarning
      summary: Acknowledge or dismiss a warning
      parameters:
        - $ref: "#/components/parameters/WarningId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarningUpdate"
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warning"
        "404":
          $ref: "#/components/responses/NotFound"

  /datasets/{datasetId}/reports:
    get:
      tags: [Reports]
      operationId: listReports
      summary: List reports for a dataset
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "200":
          description: Reports.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Reports]
      operationId: generateReport
      summary: Generate a report now
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportInput"
      responses:
        "201":
          description: Generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /reports/{reportId}:
    get:
      tags: [Reports]
      operationId: getReport
      summary: Get a report
      parameters:
        - $ref: "#/components/parameters/ReportId"
      responses:
        "200":
          description: Report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "404":
          $ref: "#/components/responses/NotFound"

  /masterdata:
    get:
      tags: [MasterData]
      operationId: listMasterData
      summary: List operator-maintained reference data
      responses:
        "200":
          description: Master data entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MasterDataEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [MasterData]
      operationId: createMasterData
      summary: Create a reference data entry (operator only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MasterDataInput"
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MasterDataEntry"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /masterdata/{entryId}:
    patch:
      tags: [MasterData]
      operationId: updateMasterData
      summary: Update a reference data entry (operator only)
      parameters:
        - $ref: "#/components/parameters/EntryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MasterDataUpdate"
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MasterDataEntry"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [MasterData]
      operationId: deleteMasterData
      summary: Delete a reference data entry (operator only)
      parameters:
        - $ref: "#/components/parameters/EntryId"
      responses:
        "204":
          description: Deleted.
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/stats:
    get:
      tags: [Admin]
      operationId: getAdminStats
      summary: Operator monitoring overview (metadata only, no customer data)
      responses:
        "200":
          description: Stats.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/activity:
    get:
      tags: [Admin]
      operationId: getAdminActivity
      summary: Audit log of analyses that ran (no customer data values)
      responses:
        "200":
          description: Activity entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"
        "403":
          $ref: "#/components/responses/Forbidden"

  /datasets/{datasetId}/templates:
    get:
      tags: [Templates]
      operationId: listTemplates
      summary: List active analysis templates for a dataset (with last-run context)
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "200":
          description: Templates with optional last-run metadata.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnalysisTemplate"
        "404":
          $ref: "#/components/responses/NotFound"

  /datasets/{datasetId}/templates/{templateId}/run:
    post:
      tags: [Templates]
      operationId: runTemplate
      summary: Run a template — creates a new analysis and starts the agent in the background
      parameters:
        - $ref: "#/components/parameters/DatasetId"
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Analysis created and agent started.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunTemplateResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/templates:
    get:
      tags: [Admin]
      operationId: listAdminTemplates
      summary: List all templates (incl. inactive) for operator management
      responses:
        "200":
          description: All templates.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminTemplate"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Admin]
      operationId: createAdminTemplate
      summary: Create a new analysis template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateInput"
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTemplate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/templates/reorder:
    patch:
      tags: [Admin]
      operationId: reorderAdminTemplates
      summary: Bulk-update sort order of templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateReorderBody"
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/templates/{templateId}:
    patch:
      tags: [Admin]
      operationId: updateAdminTemplate
      summary: Update a template
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateUpdate"
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTemplate"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Admin]
      operationId: deleteAdminTemplate
      summary: Delete a template
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted.
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /privacy/export:
    post:
      tags: [Privacy]
      operationId: exportMyData
      summary: Export all of the current user's data (DSGVO)
      responses:
        "200":
          description: Export bundle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataExport"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /privacy/data:
    delete:
      tags: [Privacy]
      operationId: deleteMyData
      summary: Permanently delete all of the current user's data (DSGVO)
      responses:
        "204":
          description: Deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  parameters:
    DatasetId:
      name: datasetId
      in: path
      required: true
      schema:
        type: string
    FileId:
      name: fileId
      in: path
      required: true
      schema:
        type: string
    AnalysisId:
      name: analysisId
      in: path
      required: true
      schema:
        type: string
    RuleId:
      name: ruleId
      in: path
      required: true
      schema:
        type: string
    WarningId:
      name: warningId
      in: path
      required: true
      schema:
        type: string
    ReportId:
      name: reportId
      in: path
      required: true
      schema:
        type: string
    EntryId:
      name: entryId
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Authentication required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: Not allowed for this role.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ServerError:
      description: Server error.
      content:
        application/json:
