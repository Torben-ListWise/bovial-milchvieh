workflows:
  ios-testflight:
    name: Bovial iOS → TestFlight
    max_build_duration: 60
    environment:
      node: v20
      xcode: latest
      cocoapods: default
      groups:
        - iOS
        - Clerk
      vars:
        BUNDLE_ID: com.bovial.app
        APP_STORE_APP_ID: "6788433068"
        APPLE_TEAM_ID: W65GNXZJFL
        EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: $CLERK_PUBLISHABLE_KEY
        EXPO_PUBLIC_DOMAIN: bovial.com
    scripts:
      - name: Enable pnpm via corepack
        script: |
          corepack enable
          corepack prepare pnpm@10.26.1 --activate

      - name: Install dependencies
        script: |
          pnpm install --frozen-lockfile

      - name: Patch react-native spm.rb (all copies)
        script: |
          echo "=== react-native copies in pnpm store ==="
          ls node_modules/.pnpm | grep "^react-native@0.81.5" || echo "NONE FOUND"
          echo "=== Patching all spm.rb copies ==="
          for SPM_RB in node_modules/.pnpm/react-native@0.81.5*/node_modules/react-native/scripts/cocoapods/spm.rb; do
            [ -f "$SPM_RB" ] || continue
            echo "Checking: $SPM_RB"
            if grep -q "package_product_dependencies.nil?" "$SPM_RB"; then
              echo "  Already patched, skipping."
            else
              ruby -e '
                path = ARGV[0]
                content = File.read(path)
                guard = "    if target.nil? || !target.respond_to?(:package_product_dependencies) || target.package_product_dependencies.nil?\n      return\n    end\n"
                content.gsub!(
                  "  def add_spm_to_target(project, target, url, requirement, products)\n    pkg_class",
                  "  def add_spm_to_target(project, target, url, requirement, products)\n" + guard + "    pkg_class"
                )
                File.write(path, content)
                puts "  Patched: #{path}"
              ' "$SPM_RB"
            fi
          done
          echo "=== Verifying patch in resolved copy ==="
          RN_PKG=$(cd artifacts/bovial-mobile && node --print "require.resolve(\"react-native/package.json\")")
          RN_DIR=$(dirname "$RN_PKG")
          grep -n "package_product_dependencies.nil?" "$RN_DIR/scripts/cocoapods/spm.rb" && echo "PATCH CONFIRMED" || echo "WARNING: patch not found in resolved copy"

      - name: Expo prebuild (iOS)
        script: |
          cd artifacts/bovial-mobile
          npx expo prebuild --platform ios --clean --no-install
          # Override CFBundleVersion with an offset build number so it is always
          # higher than any previously uploaded value.
          # Offset 1001: CM_BUILD_NUMBER=0 on first/retry run → 1001, which clears
          # the App Store Connect duplicate-1000 block. Subsequent runs increment further.
          BUILD_VERSION=$((CM_BUILD_NUMBER + 1001))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_VERSION" ios/Bovial/Info.plist
          echo "=== CFBundleVersion set to: $BUILD_VERSION (CM_BUILD_NUMBER=$CM_BUILD_NUMBER) ==="

      - name: Create .xcode.env (node path for Xcode script phases)
        script: |
          # expo prebuild --clean wipes ios/ — so we create .xcode.env AFTER
          # prebuild but BEFORE pod install. with-node.sh sources this file
          # before every Node-based Xcode script phase (e.g. EXConstants).
          NODE_BINARY_PATH="$(which node)"
          NODE_MODULES_PATH="${CM_BUILD_DIR}/artifacts/bovial-mobile/node_modules"
          {
            echo "export NODE_BINARY=${NODE_BINARY_PATH}"
            echo "export NODE_PATH=${NODE_MODULES_PATH}"
          } > artifacts/bovial-mobile/ios/.xcode.env
          echo "=== ios/.xcode.env written ==="
          cat artifacts/bovial-mobile/ios/.xcode.env

      - name: Install CocoaPods
        script: |
          cd artifacts/bovial-mobile/ios
          pod install

      - name: Patch get-app-config-ios.sh (BUNDLE_FORMAT fallback for Xcode 16+)
        script: |
          # PRIMARY FIX: withBundleFormatFix.js config plugin sets BUNDLE_FORMAT=shallow
          # as an Xcode build setting on the EXConstants target via a Podfile post_install
          # hook. This step is a belt-and-suspenders file-level patch as a backup.
          #
          # Key improvement vs. previous approach: we do NOT resolve the pnpm symlink with
          # pwd -P (which points to the read-only pnpm store on macOS). Instead:
          #   1. Copy the script via the symlink path to a writable temp file
          #   2. Patch the temp file
          #   3. rm the symlink (removes only the symlink, not the store file)
          #   4. cp the patched file into the now-vacant path
          # This sidesteps all pnpm-store read-only permission issues on macOS CI.
          LINK="${CM_BUILD_DIR}/artifacts/bovial-mobile/node_modules/expo-constants"
          if [ ! -d "$LINK" ]; then
            echo "❌ expo-constants not found at $LINK"
            exit 1
          fi
          SH_LINK="$LINK/scripts/get-app-config-ios.sh"
          if [ ! -f "$SH_LINK" ]; then
            echo "❌ get-app-config-ios.sh not found (via symlink)"
            exit 1
          fi
          echo "=== Script path (via symlink): $SH_LINK ==="
          echo "=== Real path: $(cd "$(dirname "$SH_LINK")" && pwd -P)/$(basename "$SH_LINK") ==="
          if grep -q "BUNDLE_FORMAT_PATCHED" "$SH_LINK"; then
            echo "✅ Already patched — skipping"
          else
            _TMP=$(mktemp /tmp/get-app-config-ios_XXXXXX.sh)
            cp "$SH_LINK" "$_TMP"
            _PATCH=$(mktemp /tmp/patch_XXXXXX.py)
            echo '' | base64 -d > "$_PATCH"
            python3 "$_PATCH" "$_TMP"
            rm -f "$_PATCH"
            rm -f "$SH_LINK"
            cp "$_TMP" "$SH_LINK"
            chmod +x "$SH_LINK"
            rm -f "$_TMP"
            echo "✅ BUNDLE_FORMAT fallback injected (symlink replaced with patched file)"
          fi
          echo "=== BUNDLE_FORMAT section (context) ==="
          grep -n -A2 -B2 "BUNDLE_FORMAT" "$SH_LINK"

      - name: Resolve Swift Package dependencies (ClerkKit)
        script: |
          # xcodebuild archive on a fresh CI runner does NOT reliably resolve
          # SPM packages that CocoaPods attached to the Pods project (ClerkKit
          # via ClerkExpo's spm_dependency). Xcode's GUI resolves them when
          # opening the workspace; on CI we must do it explicitly, otherwise
          # the ClerkExpo target is silently skipped and the app target fails
          # with "no such module 'ClerkExpo'".
          cd artifacts/bovial-mobile/ios
          xcodebuild -resolvePackageDependencies \
            -workspace Bovial.xcworkspace \
            -scheme Bovial
          echo "=== Resolved SPM packages ==="
          find ~/Library/Developer/Xcode/DerivedData -maxdepth 4 -type d -name "clerk-ios*" 2>/dev/null || true
          ls Pods/Bovial.xcworkspace 2>/dev/null || true

      - name: Fetch signing files
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@env:APP_STORE_CONNECT_PRIVATE_KEY" \
            --certificate-key "@env:CERTIFICATE_PRIVATE_KEY" \
            --create
          keychain add-certificates

      - name: Build IPA
        script: |
          cd artifacts/bovial-mobile
          export PROJECT_ROOT="${CM_BUILD_DIR}/artifacts/bovial-mobile"
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/Bovial.xcworkspace \
            --scheme Bovial

    artifacts:
      - artifacts/bovial-mobile/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
