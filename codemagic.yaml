workflows:
  ios-testflight:
    name: Bovial iOS → TestFlight
    max_build_duration: 60
    environment:
      node: v20
      xcode: 16.4
      cocoapods: default
      groups:
        - iOS
        - Clerk
      vars:
        BUNDLE_ID: com.bovial.app
        APP_STORE_APP_ID: "6788433068"
        APPLE_TEAM_ID: W65GNXZJFL
        EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: $CLERK_PUBLISHABLE_KEY
    scripts:
      - name: Enable pnpm via corepack
        script: |
          corepack enable
          corepack prepare pnpm@10.26.1 --activate

      - name: Install dependencies
        script: |
          pnpm install --frozen-lockfile

      - name: Patch react-native spm.rb (all copies)
        script: |
          echo "=== react-native copies in pnpm store ==="
          ls node_modules/.pnpm | grep "^react-native@0.81.5" || echo "NONE FOUND"
          echo "=== Patching all spm.rb copies ==="
          for SPM_RB in node_modules/.pnpm/react-native@0.81.5*/node_modules/react-native/scripts/cocoapods/spm.rb; do
            [ -f "$SPM_RB" ] || continue
            echo "Checking: $SPM_RB"
            if grep -q "package_product_dependencies.nil?" "$SPM_RB"; then
              echo "  Already patched, skipping."
            else
              ruby -e '
                path = ARGV[0]
                content = File.read(path)
                guard = "    if target.nil? || !target.respond_to?(:package_product_dependencies) || target.package_product_dependencies.nil?\n      return\n    end\n"
                content.gsub!(
                  "  def add_spm_to_target(project, target, url, requirement, products)\n    pkg_class",
                  "  def add_spm_to_target(project, target, url, requirement, products)\n" + guard + "    pkg_class"
                )
                File.write(path, content)
                puts "  Patched: #{path}"
              ' "$SPM_RB"
            fi
          done
          echo "=== Verifying patch in resolved copy ==="
          RN_PKG=$(cd artifacts/bovial-mobile && node --print "require.resolve(\"react-native/package.json\")")
          RN_DIR=$(dirname "$RN_PKG")
          grep -n "package_product_dependencies.nil?" "$RN_DIR/scripts/cocoapods/spm.rb" && echo "PATCH CONFIRMED" || echo "WARNING: patch not found in resolved copy"

      - name: Expo prebuild (iOS)
        script: |
          cd artifacts/bovial-mobile
          npx expo prebuild --platform ios --clean --no-install

      - name: Create .xcode.env (node path for Xcode script phases)
        script: |
          # expo prebuild --clean wipes ios/ — so we create .xcode.env AFTER
          # prebuild but BEFORE pod install. with-node.sh sources this file
          # before every Node-based Xcode script phase (e.g. EXConstants).
          #
          # NODE_PATH is required in pnpm monorepos: getAppConfig.js calls
          # require('@expo/env') from inside Pods/ExpoConstants/scripts/build/.
          # Without NODE_PATH the module walk-up may not reach
          # bovial-mobile/node_modules even though the symlinks exist there,
          # because pnpm symlinks can be skipped by Node's resolver in some
          # platform/version combinations. Setting NODE_PATH is unconditionally
          # safe and explicit.
          NODE_BINARY_PATH="$(which node)"
          NODE_MODULES_PATH="${CM_BUILD_DIR}/artifacts/bovial-mobile/node_modules"
          {
            echo "export NODE_BINARY=${NODE_BINARY_PATH}"
            echo "export NODE_PATH=${NODE_MODULES_PATH}"
          } > artifacts/bovial-mobile/ios/.xcode.env
          echo "=== ios/.xcode.env written ==="
          cat artifacts/bovial-mobile/ios/.xcode.env
          echo "=== Verify @expo/env + @expo/config resolvable with NODE_PATH ==="
          NODE_PATH="${NODE_MODULES_PATH}" node -e "
            require('@expo/env');
            require('@expo/config');
            console.log('✅ @expo/env and @expo/config resolved OK via NODE_PATH');
          " || echo "❌ Module resolution with NODE_PATH FAILED — check NODE_MODULES_PATH"

      - name: Install CocoaPods
        script: |
          cd artifacts/bovial-mobile/ios
          pod install

      - name: Inspect ExpoConstants scripts (diagnostic)
        script: |
          PODS_EXCONSTANTS="${CM_BUILD_DIR}/artifacts/bovial-mobile/ios/Pods/ExpoConstants"
          echo "=== ExpoConstants scripts tree ==="
          find "$PODS_EXCONSTANTS/scripts" -type f 2>/dev/null || echo "no scripts dir found"
          echo "=== get-app-config-ios.sh first 30 lines ==="
          head -30 "$PODS_EXCONSTANTS/scripts/get-app-config-ios.sh" 2>/dev/null || echo "not found"

      - name: Patch get-app-config-ios.sh (NODE_PATH + BUNDLE_FORMAT)
        script: |
          SH="${CM_BUILD_DIR}/artifacts/bovial-mobile/ios/Pods/ExpoConstants/scripts/get-app-config-ios.sh"
          if [ ! -f "$SH" ]; then
            echo "⚠️  get-app-config-ios.sh not found — skipping"
          else
            # Patch 1: inject NODE_PATH export after the shebang so that when
            # get-app-config-ios.sh calls `node getAppConfig.js`, Node.js finds
            # @expo/config and @expo/env via NODE_PATH rather than the walk-up
            # algorithm (which fails in pnpm monorepos).
            # SRCROOT is a standard Xcode build setting = bovial-mobile/ios,
            # so ${SRCROOT}/../node_modules = bovial-mobile/node_modules.
            if grep -q "NODE_PATH_PATCHED" "$SH"; then
              echo "✅ NODE_PATH already patched — skipping"
            else
              python3 -c "import sys; f=open(sys.argv[1],'r'); lines=f.readlines(); f.close(); idx=1 if lines and lines[0].startswith('#!') else 0; lines.insert(idx,'# NODE_PATH_PATCHED\nexport NODE_PATH=\"\${SRCROOT}/../node_modules\"\n'); open(sys.argv[1],'w').writelines(lines)" "$SH"
              echo "✅ NODE_PATH injected into get-app-config-ios.sh"
            fi
            # Patch 2: BUNDLE_FORMAT fallback so the script never fails when
            # Xcode 16+ does not propagate BUNDLE_FORMAT to pod script phases.
            if grep -q "BUNDLE_FORMAT_PATCHED" "$SH"; then
              echo "✅ BUNDLE_FORMAT already patched — skipping"
            else
              sed -i '' 's/^if \[ "\$BUNDLE_FORMAT" == "shallow" \]/# BUNDLE_FORMAT_PATCHED\nBUNDLE_FORMAT="${BUNDLE_FORMAT:-shallow}"\nif [ "$BUNDLE_FORMAT" == "shallow" ]/' "$SH"
              echo "✅ BUNDLE_FORMAT fallback patched"
            fi
            echo "=== Patched get-app-config-ios.sh (first 25 lines) ==="
            head -25 "$SH"
          fi

      - name: Fetch signing files
        script: |
          keychain initialize
          # CERTIFICATE_PRIVATE_KEY (iOS env group) must be a valid RSA PEM key.
          # It is used to match an existing Apple Distribution certificate or
          # create a new one (--create). Because it is stable across builds,
          # Apple only ever creates ONE certificate for this key — no 409.
          # See setup instructions in codemagic-signing-setup.md at repo root.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@env:APP_STORE_CONNECT_PRIVATE_KEY" \
            --certificate-key "@env:CERTIFICATE_PRIVATE_KEY" \
            --create
          keychain add-certificates

      - name: Build IPA
        script: |
          cd artifacts/bovial-mobile
          # PROJECT_ROOT is read by expo-constants' get-app-config-ios.sh to
          # locate the project's package.json at Xcode archive time.
          # Default would be $PROJECT_DIR/../.. (ios/Pods/../.. = bovial-mobile),
          # but we set it explicitly so it is never wrong regardless of how
          # xcodebuild resolves PROJECT_DIR in an archive vs. build context.
          export PROJECT_ROOT="${CM_BUILD_DIR}/artifacts/bovial-mobile"
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/Bovial.xcworkspace \
            --scheme Bovial

    artifacts:
      - artifacts/bovial-mobile/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
