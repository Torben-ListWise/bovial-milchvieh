workflows:
  ios-testflight:
    name: Bovial iOS → TestFlight
    max_build_duration: 60
    integrations:
      app_store_connect: Bovial
    environment:
      node: v20
      xcode: latest
      cocoapods: default
      groups:
        - ios_credentials
      vars:
        BUNDLE_ID: com.bovial.app
        APP_STORE_APP_ID: "6788433068"
        APPLE_TEAM_ID: W65GNXZJFL
    scripts:
      - name: Enable pnpm via corepack
        script: |
          corepack enable
          corepack prepare pnpm@10.26.1 --activate

      - name: Install dependencies
        script: |
          pnpm install --frozen-lockfile

      - name: Diagnose react-native patch
        script: |
          echo "=== Git commit ==="
          git rev-parse HEAD
          git log -1 --oneline
          echo "=== Patch file present? ==="
          ls -la patches/react-native.patch
          sha256sum patches/react-native.patch
          echo "=== patchedDependencies entry ==="
          grep -A2 "patchedDependencies" pnpm-workspace.yaml
          echo "=== Resolved react-native dirs in store ==="
          ls node_modules/.pnpm | grep "^react-native@0.81.5" || echo "NONE FOUND"
          echo "=== Which react-native does bovial-mobile resolve to? ==="
          cd artifacts/bovial-mobile
          node -e "console.log(require.resolve('react-native/package.json'))"
          echo "=== Does the resolved spm.rb contain our patch? ==="
          RN_PKG=$(node -e "console.log(require.resolve('react-native/package.json'))")
          RN_DIR=$(dirname "$RN_PKG")
          grep -n "package_product_dependencies.nil\|target.nil?" "$RN_DIR/scripts/cocoapods/spm.rb" || echo "PATCH NOT FOUND IN RESOLVED FILE"

      - name: Expo prebuild (iOS)
        script: |
          cd artifacts/bovial-mobile
          npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        script: |
          cd artifacts/bovial-mobile/ios
          pod install

      - name: Set up signing & build IPA
        script: |
          cd artifacts/bovial-mobile
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/Bovial.xcworkspace \
            --scheme Bovial

    artifacts:
      - artifacts/bovial-mobile/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
