workflows:
  ios-testflight:
    name: Bovial iOS → TestFlight
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bovial.app
      node: v20
      xcode: latest
      cocoapods: default
      groups:
        - ios_credentials
      integrations:
        app_store_connect: Bovial
      vars:
        BUNDLE_ID: com.bovial.app
        APP_STORE_APP_ID: "6788433068"
    scripts:
      - name: Enable pnpm via corepack
        script: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install dependencies
        script: |
          pnpm install --frozen-lockfile

      - name: Expo prebuild (iOS)
        script: |
          cd artifacts/bovial-mobile
          npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        script: |
          cd artifacts/bovial-mobile/ios
          pod install

      - name: Build IPA
        script: |
          cd artifacts/bovial-mobile
          xcode-project build-ipa \
            --workspace ios/Bovial.xcworkspace \
            --scheme Bovial

    artifacts:
      - artifacts/bovial-mobile/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
